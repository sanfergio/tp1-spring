# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/auditdb
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - update cria tabelas faltantes (apenas para o schema aventura)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=audit   # schema padr„o para as entidades antigas
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true   # permite criar schema aventura